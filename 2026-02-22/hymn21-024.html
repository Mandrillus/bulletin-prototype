<h3>讃美歌21 24番 「たたえよ、主の民」</h3>

<h4>Verse 1</h4>
<div class="romaji">
Tatae yo, shu no tami, mitsukai to tomo ni,<br>
Megumi ni afureru Chichi, Ko, Seirei o.
</div>

<div class="jp">
たたえよ、主の民、みつかいと共に、<br>
恵みにあふれる　父・子・聖霊を。
</div>

<div class="en">
Praise, O people of the Lord, with the angels together,<br>
The Father, Son, and Holy Spirit, full of grace.
